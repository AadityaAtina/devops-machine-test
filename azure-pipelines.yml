trigger:
  - main

pool:
  vmImage: ubuntu-latest

variables:
  imageRepository: machine-test-api
  dockerfilePath: app/Dockerfile
  tag: $(Build.BuildId)
  # TODO: Set these in Azure DevOps Variable Groups or Pipeline Variables (do NOT hardcode)
  # acrName: your-acr-name
  # resourceGroupName: your-rg-name
  # aksName: your-aks-name

stages:
  - stage: Build
    displayName: Build and Test
    jobs:
      - job: BuildAndTest
        displayName: Install dependencies and run tests
        steps:
          - checkout: self

          - task: NodeTool@0
            inputs:
              versionSpec: '20.x'
            displayName: Use Node.js 20

          - script: |
              cd app
              npm install
              npm test
            displayName: Install and test

  - stage: Docker
