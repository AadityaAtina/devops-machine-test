# TODO: Candidate must complete this Ingress manifest
# Install nginx ingress controller on AKS before applying:
# kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.8.0/deploy/static/provider/cloud/deploy.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
  namespace: app
  annotations:
    kubernetes.io/ingress.class: nginx
    # TODO: Add additional annotations (e.g. rewrite-target, ssl-redirect)
spec:
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
  # TODO: Add TLS configuration if using a custom domain
  # tls:
  #   - hosts:
  #       - yourdomain.example.com
  #     secretName: tls-secret
