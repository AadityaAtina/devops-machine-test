apiVersion: apps/v1
kind: Deployment
metadata:
  name: machine-test-api
  labels:
    app: machine-test-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: machine-test-api
  template:
    metadata:
      labels:
        app: machine-test-api
    spec:
      containers:
        - name: machine-test-api
          image: REPLACE_WITH_ACR_IMAGE  # TODO: Set your ACR image path here
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
